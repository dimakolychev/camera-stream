<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RPi Camera Streams</title>

  <style>
    :root {
      color-scheme: dark;
      --bg: #08111a;
      --panel: rgba(12,24,36,.92);
      --line: rgba(123,180,255,.28);
      --text: #e8f1ff;
      --muted: #9db3cc;
      --accent: #5fd3bc;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:"Segoe UI",sans-serif;
      color:var(--text);
      background:
      radial-gradient(circle at top left,rgba(95,211,188,.2),transparent 28%),
      radial-gradient(circle at top right,rgba(91,146,255,.18),transparent 32%),
      linear-gradient(180deg,#08111a,#050a11);
      min-height:100vh;
    }

    main{
      max-width:1280px;
      margin:auto;
      padding:24px;
    }

    h1{
      margin:0 0 8px;
      font-size:clamp(28px,5vw,42px);
    }

    p{
      color:var(--muted);
      margin-bottom:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
      gap:20px;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow:0 20px 60px rgba(0,0,0,.3);
    }

    .label{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:12px;
      font-size:18px;
      font-weight:600;
    }

    .pill{
      padding:6px 10px;
      border-radius:999px;
      background:rgba(95,211,188,.15);
      color:var(--accent);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.08em;
    }

    img{
      width:100%;
      aspect-ratio:16/9;
      object-fit:cover;
      background:#000;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
    }

    .links{
      margin-top:12px;
      font-size:14px;
      color:var(--muted);
    }

    .links a{
      color:#9ed0ff;
      text-decoration:none;
    }

    .links a:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>

<main>

<h1>Dual USB Camera Streams</h1>

<p>
Страница просмотра камер Raspberry Pi.
Работает автоматически с любым IP-адресом ровера.
</p>

<section class="grid">

<article class="card">

<div class="label">
<span>Camera 1</span>
<span class="pill">8081</span>
</div>

<img id="cam1" alt="Camera 1">

<div class="links">
Stream URL:
<a id="cam1link" href="#"></a>
</div>

</article>

<article class="card">

<div class="label">
<span>Camera 2</span>
<span class="pill">8082</span>
</div>

<img id="cam2" alt="Camera 2">

<div class="links">
Stream URL:
<a id="cam2link" href="#"></a>
</div>

</article>

</section>

</main>

<script>

const host = location.hostname;

const cam1 = `http://${host}:8081/stream`;
const cam2 = `http://${host}:8082/stream`;

document.getElementById("cam1").src = cam1;
document.getElementById("cam2").src = cam2;

const l1 = document.getElementById("cam1link");
l1.href = cam1;
l1.textContent = cam1;

const l2 = document.getElementById("cam2link");
l2.href = cam2;
l2.textContent = cam2;

</script>

</body>
</html>
