<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RPi Camera Streams</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111a;
      --panel: rgba(12, 24, 36, 0.92);
      --line: rgba(123, 180, 255, 0.28);
      --text: #e8f1ff;
      --muted: #9db3cc;
      --accent: #5fd3bc;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(95, 211, 188, 0.2), transparent 28%),
        radial-gradient(circle at top right, rgba(91, 146, 255, 0.18), transparent 32%),
        linear-gradient(180deg, #08111a 0%, #050a11 100%);
      min-height: 100vh;
    }

    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 5vw, 42px);
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
    }

    .label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      font-size: 18px;
      font-weight: 600;
    }

    .pill {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(95, 211, 188, 0.15);
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 14px;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .links {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
    }

    .links a {
      color: #9ed0ff;
      text-decoration: none;
    }

    .links a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <main>
    <h1>Dual USB Camera Streams</h1>
    <p>Страница просмотра на Raspberry Pi. Откройте ссылки ниже в браузере или во VLC через Media -> Open Network Stream.</p>
    <section class="grid">
      <article class="card">
        <div class="label">
          <span>Camera 1</span>
          <span class="pill">Port 8081</span>
        </div>
        <img src="http://10.125.26.131:8081/stream" alt="Camera 1 stream">
        <div class="links">
          Stream URL: <a href="http://10.125.26.131:8081/stream">http://10.125.26.131:8081/stream</a>
        </div>
      </article>
      <article class="card">
        <div class="label">
          <span>Camera 2</span>
          <span class="pill">Port 8082</span>
        </div>
        <img src="http://10.125.26.131:8082/stream" alt="Camera 2 stream">
        <div class="links">
          Stream URL: <a href="http://10.125.26.131:8082/stream">http://10.125.26.131:8082/stream</a>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
